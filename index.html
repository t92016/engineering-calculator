<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多功能工程計算機</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', 'Noto Sans TC', sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.calculator {
  background: #1a1a2e;
  border-radius: 20px;
  padding: 25px;
  width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.display {
  background: #16213e;
  border-radius: 15px;
  padding: 20px;
  margin-bottom: 20px;
  min-height: 120px;
}
.history-display {
  text-align: right;
  font-size: 14px;
  color: #888;
  min-height: 20px;
  word-wrap: break-word;
}
.input-display {
  text-align: right;
  font-size: 36px;
  color: #fff;
  font-weight: 300;
  min-height: 50px;
  word-wrap: break-word;
  overflow-x: auto;
  white-space: nowrap;
}
.result-display {
  text-align: right;
  font-size: 28px;
  color: #00d2ff;
  min-height: 35px;
  word-wrap: break-word;
}
.mode-indicator {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  font-size: 12px;
}
.mode-indicator span {
  color: #666;
  padding: 2px 8px;
  border-radius: 4px;
  background: #0f3460;
}
.mode-indicator .active {
  color: #00d2ff;
  background: #1a3a6a;
}
.buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}
button {
  padding: 15px 0;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 500;
}
button:active { transform: scale(0.92); }
.btn-func {
  background: #0f3460;
  color: #00d2ff;
}
.btn-func:hover { background: #1a4a80; }
.btn-op {
  background: #e94560;
  color: #fff;
}
.btn-op:hover { background: #ff5a75; }
.btn-num {
  background: #16213e;
  color: #fff;
}
.btn-num:hover { background: #1f2f55; }
.btn-eq {
  background: #00d2ff;
  color: #1a1a2e;
}
.btn-eq:hover { background: #33ddff; }
.btn-clear {
  background: #533483;
  color: #fff;
}
.btn-clear:hover { background: #6a42a0; }
.btn-memory {
  background: #2d4059;
  color: #aaa;
  font-size: 14px;
}
.btn-memory:hover { background: #3a5070; }
.btn-2col { grid-column: span 2; }
.btn-3col { grid-column: span 3; }
</style>
</head>
<body>
<div class="calculator">
  <div class="display">
    <div class="mode-indicator">
      <span id="angleMode" class="active">DEG</span>
      <span id="memIndicator" style="display:none;">M</span>
    </div>
    <div class="history-display" id="historyDisplay"></div>
    <div class="input-display" id="inputDisplay">0</div>
    <div class="result-display" id="resultDisplay"></div>
  </div>
  <div class="buttons">
    <button class="btn-func" onclick="toggleAngleMode()" title="角度/弧度切換">D/R</button>
    <button class="btn-memory" onclick="mc()">MC</button>
    <button class="btn-memory" onclick="mr()">MR</button>
    <button class="btn-memory" onclick="mPlus()">M+</button>
    <button class="btn-memory" onclick="mMinus()">M-</button>

    <button class="btn-func" onclick="insertFunc('sin(')">sin</button>
    <button class="btn-func" onclick="insertFunc('cos(')">cos</button>
    <button class="btn-func" onclick="insertFunc('tan(')">tan</button>
    <button class="btn-op" onclick="backspace()">⌫</button>
    <button class="btn-clear" onclick="clearAll()">AC</button>

    <button class="btn-func" onclick="insertFunc('log(')">log</button>
    <button class="btn-func" onclick="insertFunc('ln(')">ln</button>
    <button class="btn-func" onclick="insertFunc('sqrt(')">√</button>
    <button class="btn-func" onclick="openParen()">(</button>
    <button class="btn-func" onclick="closeParen()">)</button>

    <button class="btn-func" onclick="insertFunc('asin(')">sin⁻¹</button>
    <button class="btn-func" onclick="insertFunc('acos(')">cos⁻¹</button>
    <button class="btn-func" onclick="insertFunc('atan(')">tan⁻¹</button>
    <button class="btn-num" onclick="append('7')">7</button>
    <button class="btn-num" onclick="append('8')">8</button>

    <button class="btn-func" onclick="insertFunc('pow(')">xʸ</button>
    <button class="btn-func" onclick="insertFunc('abs(')">|x|</button>
    <button class="btn-func" onclick="insertFunc('round(')">round</button>
    <button class="btn-num" onclick="append('9')">9</button>
    <button class="btn-op" onclick="append('÷')">÷</button>

    <button class="btn-func" onclick="insertConst('pi')">π</button>
    <button class="btn-func" onclick="insertConst('e')">e</button>
    <button class="btn-func" onclick="factorial()">x!</button>
    <button class="btn-num" onclick="append('4')">4</button>
    <button class="btn-num" onclick="append('5')">5</button>

    <button class="btn-func" onclick="append('EE')">EE</button>
    <button class="btn-func" onclick="insertFunc('pow10(')">10ˣ</button>
    <button class="btn-func" onclick="insertFunc('exp(')">eˣ</button>
    <button class="btn-num" onclick="append('6')">6</button>
    <button class="btn-op" onclick="append('×')">×</button>

    <button class="btn-func" onclick="toggleSign()">±</button>
    <button class="btn-func" onclick="append('²')">x²</button>
    <button class="btn-func" onclick="insertFunc('cbrt(')">³√</button>
    <button class="btn-num" onclick="append('1')">1</button>
    <button class="btn-num" onclick="append('2')">2</button>

    <button class="btn-func" onclick="append('%')">%</button>
    <button class="btn-func" onclick="insertFunc('inv(')">1/x</button>
    <button class="btn-clear" onclick="clearEntry()">CE</button>
    <button class="btn-num" onclick="append('3')">3</button>
    <button class="btn-op" onclick="append('-')">−</button>

    <button class="btn-memory btn-2col" onclick="showHistory()">History</button>
    <button class="btn-num" onclick="append('0')">0</button>
    <button class="btn-num" onclick="append('.')">.</button>
    <button class="btn-op" onclick="append('+')">+</button>

    <button class="btn-eq btn-3col" onclick="calculate()">=</button>
  </div>
</div>

<script>
let input = '0';
let expression = '';
let memory = 0;
let hasMemory = false;
let calcHistory = [];
let angleMode = 'DEG';
let justCalculated = false;

const inputDisplay = document.getElementById('inputDisplay');
const resultDisplay = document.getElementById('resultDisplay');

function append(val) {
  if (justCalculated) {
    if (!isNaN(val) && val !== '.') {
      input = '0';
      expression = '';
      resultDisplay.textContent = '';
    }
    justCalculated = false;
  }
  if (val === 'EE') { input += 'E'; }
  else if (input === '0' && val !== '.') { input = val; }
  else { input += val; }
  updateDisplay();
}

function insertFunc(fn) {
  if (justCalculated) { input = ''; expression = ''; resultDisplay.textContent = ''; justCalculated = false; }
  if (input === '0') input = '';
  input += fn;
  updateDisplay();
}

function insertConst(name) {
  if (justCalculated) { input = ''; expression = ''; resultDisplay.textContent = ''; justCalculated = false; }
  if (input === '0') input = '';
  if (name === 'pi') input += Math.PI.toString();
  else if (name === 'e') input += Math.E.toString();
  updateDisplay();
}

function openParen() { input += '('; updateDisplay(); }
function closeParen() { input += ')'; updateDisplay(); }

function toggleSign() {
  if (!input) return;
  if (input.startsWith('-')) input = input.slice(1);
  else input = '-' + input;
  updateDisplay();
}

function backspace() {
  if (justCalculated) { clearAll(); return; }
  input = input.slice(0, -1);
  if (!input) input = '0';
  updateDisplay();
}

function clearAll() {
  input = '0';
  resultDisplay.textContent = '';
  justCalculated = false;
  updateDisplay();
}

function clearEntry() {
  input = '0';
  justCalculated = false;
  updateDisplay();
}

function toggleAngleMode() {
  angleMode = angleMode === 'DEG' ? 'RAD' : 'DEG';
  document.getElementById('angleMode').textContent = angleMode;
}

function toRad(x) { return angleMode === 'DEG' ? x * Math.PI / 180 : x; }
function toDeg(x) { return angleMode === 'DEG' ? x * 180 / Math.PI : x; }

// --- TOKENIZER ---
function tokenize(expr) {
  const tokens = [];
  let i = 0;
  while (i < expr.length) {
    if (expr[i] === ' ') { i++; continue; }

    // Numbers (including decimals and scientific notation with E)
    if ((expr[i] >= '0' && expr[i] <= '9') || (expr[i] === '.' && i + 1 < expr.length && expr[i+1] >= '0' && expr[i+1] <= '9')) {
      let num = '';
      while (i < expr.length && ((expr[i] >= '0' && expr[i] <= '9') || expr[i] === '.')) {
        num += expr[i]; i++;
      }
      // Check for scientific notation E
      if (i < expr.length && expr[i] === 'E') {
        num += 'E'; i++;
        if (i < expr.length && (expr[i] === '+' || expr[i] === '-')) { num += expr[i]; i++; }
        while (i < expr.length && expr[i] >= '0' && expr[i] <= '9') { num += expr[i]; i++; }
      }
      tokens.push({ type: 'num', value: parseFloat(num) });
      continue;
    }

    // Named functions and constants
    const rest = expr.slice(i);
    const funcs = ['asin','acos','atan','sin','cos','tan','sqrt','cbrt','log','ln','abs','round','exp','pow10','pow','inv'];
    let matched = false;
    for (const fn of funcs) {
      if (rest.startsWith(fn + '(') || rest === fn) {
        if (fn === 'pi') {
          tokens.push({ type: 'num', value: Math.PI }); i += 2; matched = true; break;
        }
        if (fn === 'e' && (i + 1 >= expr.length || expr[i+1] !== '(')) {
          tokens.push({ type: 'num', value: Math.E }); i += 1; matched = true; break;
        }
        tokens.push({ type: 'func', value: fn });
        i += fn.length;
        matched = true;
        break;
      }
    }
    if (matched) continue;

    // Constants by name
    if (rest.startsWith('pi')) { tokens.push({ type: 'num', value: Math.PI }); i += 2; continue; }

    // Operators and parens
    const ch = expr[i];
    if (ch === '(' || ch === ')') { tokens.push({ type: ch }); i++; continue; }
    if (ch === '+') { tokens.push({ type: 'op', value: '+', prec: 1 }); i++; continue; }
    if (ch === '-' || ch === '−') { tokens.push({ type: 'op', value: '-', prec: 1 }); i++; continue; }
    if (ch === '×' || ch === '*') { tokens.push({ type: 'op', value: '*', prec: 2 }); i++; continue; }
    if (ch === '÷' || ch === '/') { tokens.push({ type: 'op', value: '/', prec: 2 }); i++; continue; }
    if (ch === '%') { tokens.push({ type: 'op', value: '%', prec: 3 }); i++; continue; }
    if (ch === '^') { tokens.push({ type: 'op', value: '^', prec: 4 }); i++; continue; }
    if (ch === '!') { tokens.push({ type: 'postfix', value: '!' }); i++; continue; }
    if (ch === '²') { tokens.push({ type: 'postfix', value: '²' }); i++; continue; }

    // Unknown character - skip
    i++;
  }
  return tokens;
}

// --- PARSER (recursive descent, handles operator precedence) ---
let parseTokens = [];
let parsePos = 0;

function peekToken() { return parsePos < parseTokens.length ? parseTokens[parsePos] : null; }
function nextToken() { return parseTokens[parsePos++]; }

function parseExpr() { return parseAddSub(); }

function parseAddSub() {
  let left = parseMulDiv();
  while (peekToken() && peekToken().type === 'op' && (peekToken().value === '+' || peekToken().value === '-')) {
    const op = nextToken().value;
    const right = parseMulDiv();
    left = op === '+' ? left + right : left - right;
  }
  return left;
}

function parseMulDiv() {
  let left = parsePercent();
  while (peekToken() && peekToken().type === 'op' && (peekToken().value === '*' || peekToken().value === '/')) {
    const op = nextToken().value;
    const right = parsePercent();
    left = op === '*' ? left * right : left / right;
  }
  return left;
}

function parsePercent() {
  let left = parsePower();
  while (peekToken() && peekToken().type === 'op' && peekToken().value === '%') {
    nextToken();
    left = left / 100;
  }
  return left;
}

function parsePower() {
  let left = parseUnary();
  while (peekToken() && peekToken().type === 'op' && peekToken().value === '^') {
    nextToken();
    const right = parseUnary();
    left = Math.pow(left, right);
  }
  return left;
}

function parseUnary() {
  if (peekToken() && peekToken().type === 'op' && peekToken().value === '-') {
    nextToken();
    return -parsePostfix();
  }
  if (peekToken() && peekToken().type === 'op' && peekToken().value === '+') {
    nextToken();
  }
  return parsePostfix();
}

function parsePostfix() {
  let val = parsePrimary();
  while (peekToken() && peekToken().type === 'postfix') {
    const op = nextToken().value;
    if (op === '!') val = factorialize(val);
    else if (op === '²') val = val * val;
  }
  return val;
}

function parsePrimary() {
  const tok = peekToken();
  if (!tok) return 0;

  if (tok.type === 'num') {
    nextToken();
    return tok.value;
  }

  if (tok.type === '(') {
    nextToken(); // consume (
    const val = parseExpr();
    if (peekToken() && peekToken().type === ')') nextToken(); // consume )
    return val;
  }

  if (tok.type === 'func') {
    const fn = tok.value;
    nextToken();
    // Expect ( after function name
    if (peekToken() && peekToken().type === '(') nextToken(); // consume (
    const arg = parseExpr();
    if (peekToken() && peekToken().type === ')') nextToken(); // consume )
    return callFunc(fn, arg);
  }

  // Unknown token - skip
  nextToken();
  return 0;
}

function callFunc(name, x) {
  switch (name) {
    case 'sin': return Math.sin(toRad(x));
    case 'cos': return Math.cos(toRad(x));
    case 'tan': return Math.tan(toRad(x));
    case 'asin': return toDeg(Math.asin(x));
    case 'acos': return toDeg(Math.acos(x));
    case 'atan': return toDeg(Math.atan(x));
    case 'log': return Math.log10(x);
    case 'ln': return Math.log(x);
    case 'sqrt': return Math.sqrt(x);
    case 'cbrt': return Math.cbrt(x);
    case 'abs': return Math.abs(x);
    case 'round': return Math.round(x);
    case 'exp': return Math.exp(x);
    case 'pow10': return Math.pow(10, x);
    case 'inv': return 1 / x;
    case 'pow': return x; // pow needs 2 args, handled specially
    default: return x;
  }
}

function factorialize(n) {
  if (n < 0) return NaN;
  if (n === 0 || n === 1) return 1;
  if (n > 170) return Infinity;
  let r = 1;
  for (let i = 2; i <= Math.floor(n); i++) r *= i;
  return r;
}

// --- MAIN EVALUATOR ---
function safeEval(expr) {
  try {
    // Handle implicit multiplication: e.g., "2sin(" → "2*sin(", "3pi" → "3*pi", "2(" → "2*("
    let e = expr.replace(/(\d)(pi|e|sin|cos|tan|asin|acos|atan|log|ln|sqrt|cbrt|abs|round|exp|pow10|pow|inv|\()/g, '$1*$2');
    // Handle )( → )*(  and )2 → )*2 etc.
    e = e.replace(/\)([\d]|pi|e|sin|cos|tan|asin|acos|atan|log|ln|sqrt|cbrt|abs|round|exp|pow10|pow|inv|\()/g, ')*$1');
    // Handle )(  patterns
    e = e.replace(/\)\(/g, ')*(');

    parseTokens = tokenize(e);
    parsePos = 0;
    const result = parseExpr();
    return result;
  } catch (err) {
    return '錯誤';
  }
}

// --- CALCULATE ---
function calculate() {
  if (!input || input === '0') return;
  expression = input;
  const result = safeEval(expression);
  if (typeof result === 'number' && !isFinite(result)) {
    resultDisplay.textContent = '= ' + (result > 0 ? '∞' : '-∞');
    input = expression;
  } else if (typeof result === 'number' && isNaN(result)) {
    resultDisplay.textContent = '= 錯誤';
    input = expression;
  } else if (typeof result === 'number') {
    const displayVal = Number.isInteger(result) && Math.abs(result) < 1e15
      ? result.toString()
      : parseFloat(result.toPrecision(12)).toString();
    calcHistory.unshift(expression + ' = ' + displayVal);
    if (calcHistory.length > 50) calcHistory.pop();
    resultDisplay.textContent = '= ' + displayVal;
    input = expression;
  } else {
    resultDisplay.textContent = '= 錯誤';
    input = expression;
  }
  justCalculated = true;
  updateDisplay();
}

function factorial() {
  if (!input || input === '0') return;
  const val = parseFloat(input);
  if (isNaN(val)) return;
  expression = input + '!';
  const result = factorialize(val);
  const displayVal = isNaN(result) ? '錯誤' : result.toString();
  calcHistory.unshift(expression + ' = ' + displayVal);
  if (calcHistory.length > 50) calcHistory.pop();
  resultDisplay.textContent = '= ' + displayVal;
  input = expression;
  justCalculated = true;
  updateDisplay();
}

// --- MEMORY ---
function mc() { memory = 0; hasMemory = false; document.getElementById('memIndicator').style.display = 'none'; }
function mr() { input = memory.toString(); justCalculated = false; updateDisplay(); }
function mPlus() { memory += parseFloat(input) || 0; hasMemory = true; document.getElementById('memIndicator').style.display = 'inline'; }
function mMinus() { memory -= parseFloat(input) || 0; hasMemory = true; document.getElementById('memIndicator').style.display = 'inline'; }

function showHistory() {
  if (calcHistory.length === 0) { resultDisplay.textContent = '= 暫無歷史記錄'; return; }
  resultDisplay.textContent = '= ' + calcHistory.slice(0, 3).join(' | ');
}

function updateDisplay() {
  inputDisplay.textContent = input || '0';
  if (!justCalculated && resultDisplay.textContent.startsWith('= ')) {
    resultDisplay.textContent = '';
  }
}

// --- KEYBOARD ---
document.addEventListener('keydown', (e) => {
  const key = e.key;
  if (key >= '0' && key <= '9') { append(key); }
  else if (key === '.') { append('.'); }
  else if (key === '+') { append('+'); }
  else if (key === '-') { append('−'); }
  else if (key === '*') { append('×'); }
  else if (key === '/') { append('÷'); }
  else if (key === 'Enter' || key === '=') { e.preventDefault(); calculate(); }
  else if (key === 'Backspace') { e.preventDefault(); backspace(); }
  else if (key === 'Escape') { clearAll(); }
  else if (key === '(') { openParen(); }
  else if (key === ')') { closeParen(); }
  else if (key === '%') { append('%'); }
});

updateDisplay();
</script>
</body>
</html>
